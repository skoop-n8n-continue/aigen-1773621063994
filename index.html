<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Code Generator</title>
    <link rel="stylesheet" href="styles.css?v=a1b2c3">
</head>
<body>
    <div class="container">
        <header>
            <h1>Security Code Generator</h1>
        </header>

        <main>
            <div class="button-grid">
                <div class="button-card" id="card-alpha">
                    <button id="btn-alpha" class="action-btn">Alpha</button>
                    <div class="code-display" id="display-alpha">—</div>
                </div>

                <div class="button-card" id="card-bravo">
                    <button id="btn-bravo" class="action-btn">Bravo</button>
                    <div class="code-display" id="display-bravo">—</div>
                </div>

                <div class="button-card" id="card-charlie">
                    <button id="btn-charlie" class="action-btn">Charlie</button>
                    <div class="code-display" id="display-charlie">—</div>
                </div>
            </div>

            <div id="combined-section" class="hidden">
                <h2>Combined Key</h2>
                <div id="combined-key" class="key-display"></div>
            </div>
        </main>
    </div>
    <script src="script.js?v=a1b2c3"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
